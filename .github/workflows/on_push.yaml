on:
  push:
    branches:
      - feature/*

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bcit_parkly
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: bcit_parkly
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GOOGLE_MAP_ID: ${{ secrets.GOOGLE_MAP_ID }}
      MODE: ${{ secrets.MODE }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js v25.9.0
        uses: actions/setup-node@v6
        with:
          node-version: "25"
      - name: Install dependencies
        run: |
          npm install
      - name: Create test database
        run: |
          docker exec -i ${{ job.services.mysql.id }} mysql -uroot -proot < database/bcit_parkly_test_db.sql
      - name: Check required secrets
        run: |
          test -n "$GOOGLE_MAPS_API_KEY" || (echo "GOOGLE_MAPS_API_KEY is missing" && exit 1)
          test -n "$GOOGLE_MAP_ID" || (echo "GOOGLE_MAP_ID is missing" && exit 1)
          echo "All required secrets are configured."
      - name: Test with npx/tsx
        run: |
          npx tsx --test
  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() }}
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create Pull request
        run: gh pr create -B development -H ${{ github.ref_name }} --title "Merge ${{ github.ref_name }} into development" --body "Automatic PR from Github Actions"
