    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 19.5,
        center: { lat: 49.28335, lng: -123.11535 },
        mapTypeId: "roadmap"
      });

      infoWindow = new google.maps.InfoWindow();
      createControls();
      createLayers();
      showFloor("P1");
    }

    function createControls() {
      const floorControls = document.getElementById("floorControls");
      floorControls.innerHTML = "<strong>Floor:</strong>";

      Object.keys(layerData).forEach(floor => {
        const btn = document.createElement("button");
        btn.textContent = floor;
        btn.id = "floor-" + floor;
        btn.onclick = () => showFloor(floor);
        floorControls.appendChild(btn);
      });
    }

    function createZoneControls(floor) {
      const zoneControls = document.getElementById("zoneControls");
      zoneControls.innerHTML = "<strong>Zone:</strong>";

      const allBtn = document.createElement("button");
      allBtn.textContent = "ALL";
      allBtn.id = "zone-ALL";
      allBtn.onclick = () => showZone("ALL");
      zoneControls.appendChild(allBtn);

      Object.keys(layerData[floor].zones).forEach(zone => {
        const btn = document.createElement("button");
        btn.textContent = zone;
        btn.id = "zone-" + zone;
        btn.onclick = () => showZone(zone);
        zoneControls.appendChild(btn);
      });
    }

    function createLayers() {
      Object.keys(layerData).forEach(floor => {
        layers[floor] = {};

        Object.keys(layerData[floor].zones).forEach(zone => {
          layers[floor][zone] = layerData[floor].zones[zone].lots.map(lot => {
            const polygon = new google.maps.Polygon({
              paths: lot.coords,
              strokeColor: "#333333",
              strokeOpacity: 1,
              strokeWeight: 1,
              fillColor: getColor(lot.type, lot.status),
              fillOpacity: 0.75,
              map: null
            });

            polygon.meta = {
              id: lot.id,
              floor: lot.floor,
              zone: lot.zone,
              type: lot.type,
              status: lot.status,
              coords: lot.coords
            };

            polygon.addListener("click", event => {
              const text =
                "Parking Lot ID: " + polygon.meta.id + "\n" +
                "Floor: " + polygon.meta.floor + "\n" +
                "Zone: " + polygon.meta.zone + "\n" +
                "Type: " + polygon.meta.type + "\n" +
                "Status: " + polygon.meta.status;

              document.getElementById("output").textContent = text;

              infoWindow.setContent(
                "<strong>" + polygon.meta.id + "</strong><br>" +
                "Floor: " + polygon.meta.floor + "<br>" +
                "Zone: " + polygon.meta.zone + "<br>" +
                "Type: " + polygon.meta.type + "<br>" +
                "Status: " + polygon.meta.status
              );
              infoWindow.setPosition(event.latLng);
              infoWindow.open(map);
            });

            return polygon;
          });
        });
      });
    }

    function getColor(type, status) {
      if (status === "full") return "#e74c3c";
      if (type.includes("Accessible")) return "#3498db";
      if (type.includes("EV")) return "#9b59b6";
      return "#2ecc71";
    }

    function hideAll() {
      Object.keys(layers).forEach(floor => {
        Object.keys(layers[floor]).forEach(zone => {
          layers[floor][zone].forEach(poly => poly.setMap(null));
        });
      });
    }

    function showFloor(floor) {
      currentFloor = floor;
      currentZone = "ALL";
      createZoneControls(floor);
      showZone("ALL");
      setActiveButtons();
    }

    function showZone(zone) {
      currentZone = zone;
      hideAll();

      if (zone === "ALL") {
        Object.keys(layers[currentFloor]).forEach(z => {
          layers[currentFloor][z].forEach(poly => poly.setMap(map));
        });
      } else {
        layers[currentFloor][zone].forEach(poly => poly.setMap(map));
      }

      const count = countVisibleLots();
      document.getElementById("output").textContent =
        "Showing: " + currentFloor + " / " + currentZone + "\n" +
        "Lots: " + count;

      setActiveButtons();
    }

    function countVisibleLots() {
      if (currentZone === "ALL") {
        return Object.values(layers[currentFloor]).reduce((sum, lots) => sum + lots.length, 0);
      }
      return layers[currentFloor][currentZone].length;
    }

    function setActiveButtons() {
      document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
      const floorBtn = document.getElementById("floor-" + currentFloor);
      const zoneBtn = document.getElementById("zone-" + currentZone);
      if (floorBtn) floorBtn.classList.add("active");
      if (zoneBtn) zoneBtn.classList.add("active");
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAAxoG1moijgPbs_BwZYDSlvGzQHzC_Ino&callback=initMap"></script>
</body>
